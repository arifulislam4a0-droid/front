<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Signup</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #f6d365, #fda085, #84fab0);
            font-family: system-ui;
        }

        .card {
            background: white;
            padding: 35px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .link {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: #10b981;
        }

        /* loader */

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div class="card">

        <h2>Create Account</h2>

        <input id="name" placeholder="Name">
        <input id="username" placeholder="Username">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password (min 4)">
        <input id="confirmPassword" type="password" placeholder="Confirm Password">

        <button onclick="signup()">Signup</button>

        <p class="link" onclick="go('../login')">
            Back to login
        </p>

    </div>

    <script>

        const API = "https://www.ariful.pro.bd/api";
        const nameInput = document.getElementById("name");
        const usernameInput = document.getElementById("username");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("confirmPassword");


        window.onload = () => {
            setTimeout(() => loader.style.display = "none", 300);
        };

        function go(p) {
            loader.style.display = "flex";
            setTimeout(() => location.href = p, 200);
        }

        async function signup() {

            if (passwordInput.value.length < 4) {
                alert("Use minimum 4 length password");
                return;
            }

            if (password.value !== confirmPassword.value) {
                alert("Password mismatch");
                return;
            }

            loader.style.display = "flex";

            const res = await fetch(API + "/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: nameInput.value,
                    username: usernameInput.value,
                    email: emailInput.value,
                    password: passwordInput.value
                })
            });

            const data = await res.json();

            loader.style.display = "none";

            alert(data.msg);

            if (data.msg.includes("Signup")) {
                localStorage.setItem("email", email.value);
                go("../otp");
            }

        }

    </script>

</body>

</html>
