<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>OTP</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #ffecd2, #fcb69f, #a1c4fd);
            font-family: system-ui;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 350px;
        }

        .otp {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp input {
            width: 40px;
            height: 45px;
            text-align: center;
            font-size: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            border: none;
            color: white;
            border-radius: 6px;
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div class="card">

        <h2>Verify OTP</h2>

        <div class="otp">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
            <input maxlength="1">
        </div>

        <button onclick="verifyOtp()">Verify</button>

    </div>

    <script>

        const API = "https://www.ariful.pro.bd/api";

        window.onload = () => {
            setTimeout(() => loader.style.display = "none", 300);
        };

        const inputs = document.querySelectorAll(".otp input");

        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                if (input.value.length === 1 && index < 5) {
                    inputs[index + 1].focus();
                }
            });
        });

        async function verifyOtp() {

            loader.style.display = "flex";

            let otp = "";
            inputs.forEach(i => otp += i.value);

            const email = localStorage.getItem("email");

            const res = await fetch(API + "/verify_otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, otp })
            });

            const data = await res.json();

            loader.style.display = "none";

            alert(data.msg);

            if (data.msg.includes("successfully")) {
                location.href = "../login";
            }

        }

    </script>

</body>

</html>
