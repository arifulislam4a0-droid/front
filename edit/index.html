<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Viewer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .loading {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
            opacity: 0.7;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            background: white;
        }
    </style>
</head>

<body>

    <div id="loader" class="loading">Loading website...</div>
    <iframe id="viewer" style="display:none;"></iframe>

    <script>
        (async () => {

            // 🔥 URL থেকে data নেওয়া
            const params = new URLSearchParams(window.location.search);
            const username = params.get("username");
            const link = params.get("link");
            sessionStorage.setItem("username", username);
            sessionStorage.setItem("link", link);
            const token = localStorage.getItem('token'); // LocalStorage থেকে ইউজারনেম নেয়া


            if (!username || !link) {
                document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Missing username or link</h2>";
                return;
            }
            if (!username || !token) {
                alert("Username or token not found! Please login again.");
                window.location = "../"
                return;
            }

            try {

                // 🔥 Backend এ POST request
                const res = await fetch("https://www.ariful.pro.bd/api/view_edit_Website", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, link, token })
                });

                if (!res.ok) {
                    throw new Error("Website not found");
                }

                const html = await res.text();

                // 🔥 iframe এ HTML inject
                const iframe = document.getElementById("viewer");
                const loader = document.getElementById("loader");

                iframe.style.display = "block";
                loader.style.display = "none";

                iframe.srcdoc = html;

            } catch (err) {
                document.body.innerHTML = `<h2 style="text-align:center;margin-top:50px;color:red;">${err.message}</h2>`;
            }

        })();
    </script>

</body>

</html>
